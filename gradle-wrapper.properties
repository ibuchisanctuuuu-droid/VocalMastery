package com.sanctus.vocalmaster.coach

import android.content.Context
import android.speech.tts.TextToSpeech
import android.speech.tts.UtteranceProgressListener
import com.sanctus.vocalmaster.audio.AudioAnalyzer
import com.sanctus.vocalmaster.audio.PitchDetector
import com.sanctus.vocalmaster.audio.VocalRegister
import java.util.Locale
import kotlin.random.Random

/**
 * The coach's "voice" and judgment. Direct, firm, not obedient — it interrupts and
 * corrects rather than just praising.
 */
class CoachingEngine(context: Context, private val onSpeakingChanged: (Boolean) -> Unit = {}) {

    private var tts: TextToSpeech? = null
    private var ttsReady = false
    private var lastInterruptionAtMs = 0L
    private val minMsBetweenInterruptions = 4000L

    init {
        tts = TextToSpeech(context) { status ->
            if (status == TextToSpeech.SUCCESS) {
                tts?.language = Locale.US
                tts?.setPitch(0.92f)   // slightly lower, firmer tone
                tts?.setSpeechRate(1.02f)
                ttsReady = true
            }
        }
        tts?.setOnUtteranceProgressListener(object : UtteranceProgressListener() {
            override fun onStart(utteranceId: String?) = onSpeakingChanged(true)
            override fun onDone(utteranceId: String?) = onSpeakingChanged(false)
            override fun onError(utteranceId: String?) = onSpeakingChanged(false)
        })
    }

    /** Speaks immediately, interrupting whatever the coach was saying before (flush queue). */
    fun speakNow(line: String) {
        if (!ttsReady) return
        tts?.speak(line, TextToSpeech.QUEUE_FLUSH, null, "coach_${System.currentTimeMillis()}")
    }

    fun shutdown() {
        tts?.stop()
        tts?.shutdown()
    }

    /**
     * Core real-time analysis pass. Returns a firm correction line if something is wrong,
     * or null if the singer should just keep going.
     * Rate-limited so the coach doesn't talk over every single frame.
     */
    fun analyzeFrame(
        pitchDetector: PitchDetector,
        analyzer: AudioAnalyzer,
        register: VocalRegister
    ): String? {
        val now = System.currentTimeMillis()
        if (now - lastInterruptionAtMs < minMsBetweenInterruptions) return null

        val line = when {
            analyzer.isPushingTooHard() ->
                "Stop. You're pushing from your throat, not your breath. Ease off the volume and support it from lower down."

            analyzer.isVolumeDroppingFast() ->
                "You're running out of support mid-phrase. That's not a lung capacity problem — you let the air out too fast at the start. Reset your breath and try again."

            analyzer.pitchStability() > 18f ->
                "That pitch is shaky. Either you're tense or your support isn't steady. Relax your jaw and breathe from lower."

            analyzer.isTooQuiet() && register != VocalRegister.WHISTLE ->
                "I can barely hear the tone underneath your air. You're breathy — bring the cords together more, don't just blow air through them."

            register == VocalRegister.WHISTLE && analyzer.isPushingTooHard() ->
                "Whistle register does not need force. Back off the air pressure completely or you will strain."

            else -> null
        }

        if (line != null) lastInterruptionAtMs = now
        return line
    }

    /** Firm, direct praise — used sparingly, only when genuinely earned. */
    fun encouragement(): String {
        val options = listOf(
            "Good. That was supported. Do it again so it's not an accident.",
            "That one was clean. Keep that exact breath setup for the next phrase.",
            "Better. Still keep an ear on the end of the phrase, don't let it fade."
        )
        return options[Random.nextInt(options.size)]
    }

    fun openingLine(): String =
        "I'm listening. Sing your warm-up phrase. If your breath support drops or you push from your throat, I'll stop you — that's the job."

    fun explainTopic(query: String): String {
        val matches = VocalKnowledgeBase.search(query)
        if (matches.isEmpty()) return "I don't have a specific lesson on that yet. Ask me about breath support, chest voice, head voice, mix, falsetto, whistle register, belting, or vibrato."
        val topic = matches.first()
        return "${topic.title}. ${topic.summary} " + topic.keyPoints.joinToString(" ")
    }
}
